<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dontripit — Coming Soon</title>
    <meta
      name="description"
      content="Dontripit está en construcción. Estamos creando una nueva experiencia para catálogo y marketplace TCG."
    />
    <style>
      :root {
        color-scheme: dark;
        --bg-1: #05070d;
        --bg-2: #0b1020;
        --accent: #7c8cff;
        --accent-soft: rgba(124, 140, 255, 0.25);
        --text-main: #f3f5ff;
        --text-muted: #b8c0e6;
        --card-bg: rgba(12, 18, 35, 0.72);
        --card-border: rgba(180, 197, 255, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
          Ubuntu, Cantarell, "Helvetica Neue", Arial, sans-serif;
        background:
          radial-gradient(circle at 20% 15%, rgba(124, 140, 255, 0.18) 0%, transparent 40%),
          radial-gradient(circle at 80% 80%, rgba(66, 191, 255, 0.12) 0%, transparent 38%),
          linear-gradient(140deg, var(--bg-1) 0%, var(--bg-2) 45%, #050813 100%);
        color: var(--text-main);
      }

      .card {
        width: min(100%, 760px);
        padding: clamp(1.5rem, 3vw, 2.75rem);
        border-radius: 20px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        box-shadow:
          0 16px 44px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(4px);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 18px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(124, 140, 255, 0.14);
        color: #dbe1ff;
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 12px var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3.2rem);
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.65;
        font-size: clamp(1rem, 2.4vw, 1.1rem);
      }

      .lead {
        margin-top: 16px;
        max-width: 56ch;
      }

      .soon {
        margin-top: 26px;
        font-size: 0.95rem;
        color: #d8defb;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      @media (max-width: 480px) {
        body {
          padding: 18px;
        }

        .card {
          border-radius: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card" role="main" aria-label="Dontripit en construcción">
      <p class="eyebrow"><span class="dot" aria-hidden="true"></span>Dontripit</p>
      <h1>Dontripit está en construcción</h1>
      <p class="lead">Estamos construyendo una nueva experiencia para catálogo y marketplace TCG.</p>
      <p class="soon">Coming soon</p>
    </main>
  </body>
</html>
