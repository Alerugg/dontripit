name: Neon Ingest and Reindex

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      pokemon_set:
        description: 'Optional Pokemon set code (example: base1)'
        required: false
        type: string
      pokemon_limit:
        description: 'Pokemon ingest limit'
        required: false
        default: '200'
        type: string
      mtg_limit:
        description: 'MTG ingest limit'
        required: false
        default: '200'
        type: string
      incremental:
        description: 'Use incremental mode'
        required: false
        default: true
        type: boolean

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug env (no secrets)
        run: |
          if [ -n "${DATABASE_URL:-}" ]; then echo "DATABASE_URL is set"; else echo "DATABASE_URL is NOT set"; fi
          if [ -n "${DATABASE_URL_UNPOOLED:-}" ]; then echo "DATABASE_URL_UNPOOLED is set"; else echo "DATABASE_URL_UNPOOLED is NOT set"; fi

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run daily refresh pipeline
        run: |
          set -euo pipefail

          POKEMON_SET="${{ github.event.inputs.pokemon_set }}"
          POKEMON_LIMIT="${{ github.event.inputs.pokemon_limit }}"
          MTG_LIMIT="${{ github.event.inputs.mtg_limit }}"
          INCREMENTAL="${{ github.event.inputs.incremental }}"

          : "${POKEMON_LIMIT:=200}"
          : "${MTG_LIMIT:=200}"
          : "${INCREMENTAL:=true}"

          ARGS="--pokemon-limit ${POKEMON_LIMIT} --mtg-limit ${MTG_LIMIT} --incremental ${INCREMENTAL}"
          if [ -n "${POKEMON_SET}" ]; then
            ARGS="${ARGS} --pokemon-set ${POKEMON_SET}"
          fi

          echo "Running: python -m app.scripts.daily_refresh ${ARGS}"
          SUMMARY_FILE="$(mktemp)"
          python -m app.scripts.daily_refresh ${ARGS} > "${SUMMARY_FILE}"
          SUMMARY_JSON="$(cat "${SUMMARY_FILE}")"

          echo "Daily refresh summary (raw JSON):"
          cat "${SUMMARY_FILE}"

          echo "Daily refresh summary (pretty):"
          python -m json.tool < "${SUMMARY_FILE}"
