services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["local-db"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      FLASK_APP: app.main:app
      FLASK_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_UNPOOLED: ${DATABASE_URL_UNPOOLED}
      PUBLIC_API_ENABLED: ${PUBLIC_API_ENABLED:-false}
      PUBLIC_IP_RATE_LIMIT_RPM: ${PUBLIC_IP_RATE_LIMIT_RPM:-30}
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_UNPOOLED: ${DATABASE_URL_UNPOOLED}
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-false}
      PUBLIC_API_ENABLED: ${PUBLIC_API_ENABLED:-false}
      PUBLIC_IP_RATE_LIMIT_RPM: ${PUBLIC_IP_RATE_LIMIT_RPM:-30}
      SCHEDULER_JOBS: ${SCHEDULER_JOBS:-scryfall_mtg:daily,fixture_local:manual}
    volumes:
      - ./backend:/app
    command: python -m app.jobs.schedule --once
    profiles: ["worker"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      BACKEND_URL: ${BACKEND_URL:-http://localhost:5000}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:5000}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:5000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-TCG Nexus}
      NEXT_PUBLIC_DEFAULT_GAME: ${NEXT_PUBLIC_DEFAULT_GAME:-}
      ADMIN_CONSOLE_USERNAME: ${ADMIN_CONSOLE_USERNAME:-admin}
      ADMIN_CONSOLE_PASSWORD: ${ADMIN_CONSOLE_PASSWORD:-admin}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', (res) => process.exit(res.statusCode===200?0:1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
