services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-appdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      FLASK_APP: app.main:app
      FLASK_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-appdb}}
      PUBLIC_API_ENABLED: ${PUBLIC_API_ENABLED:-false}
      PUBLIC_IP_RATE_LIMIT_RPM: ${PUBLIC_IP_RATE_LIMIT_RPM:-30}
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-appdb}}
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-false}
      PUBLIC_API_ENABLED: ${PUBLIC_API_ENABLED:-false}
      PUBLIC_IP_RATE_LIMIT_RPM: ${PUBLIC_IP_RATE_LIMIT_RPM:-30}
      SCHEDULER_JOBS: ${SCHEDULER_JOBS:-scryfall_mtg:daily,fixture_local:manual}
    volumes:
      - ./backend:/app
    command: python -m app.jobs.schedule --once
    profiles: ["worker"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      BACKEND_URL: ${BACKEND_URL:-http://localhost:5000}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:5000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', (res) => process.exit(res.statusCode===200?0:1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
